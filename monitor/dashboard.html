<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
  <title>SLAWatcher</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @keyframes ping { 0% { transform:scale(1);opacity:1 } 75%,100% { transform:scale(2);opacity:0 } }
    .status-ping { animation: ping 2s cubic-bezier(0,0,0.2,1) infinite }
  </style>
</head>
<body class="bg-[#0c1222] text-white min-h-screen">
  <nav class="bg-[#111827] border-b border-gray-800 px-6 py-4 flex justify-between items-center">
    <div class="flex items-center gap-2"><span class="text-2xl">🛡️</span><h1 class="text-xl font-bold">SLAWatcher</h1></div>
    <div class="flex gap-3 text-xs">
      <span class="flex items-center gap-1"><span class="w-2 h-2 bg-green-500 rounded-full"></span> 1 monitored</span>
      <span class="flex items-center gap-1"><span class="w-2 h-2 bg-red-500 rounded-full"></span> 0 violated</span>
    </div>
  </nav>
  <main class="max-w-3xl mx-auto p-6 space-y-6">
    <!-- Register SLA -->
    <section class="bg-[#111827] rounded-2xl p-6 border border-gray-800">
      <h2 class="text-emerald-400 font-semibold mb-4">Register SLA</h2>
      <div class="grid md:grid-cols-3 gap-3 mb-3">
        <input placeholder="Service name" class="bg-[#0c1222] border border-gray-700 rounded-xl px-4 py-3 placeholder-gray-600 outline-none">
        <input placeholder="SLA promise" class="bg-[#0c1222] border border-gray-700 rounded-xl px-4 py-3 placeholder-gray-600 outline-none">
        <input placeholder="Status page URL" class="bg-[#0c1222] border border-gray-700 rounded-xl px-4 py-3 placeholder-gray-600 outline-none">
      </div>
      <button class="w-full bg-emerald-600 hover:bg-emerald-500 rounded-xl py-3 font-bold transition">Register</button>
    </section>

    <!-- SLA Cards -->
    <section class="bg-[#111827] rounded-2xl p-6 border border-gray-800">
      <h2 class="font-semibold mb-4">Monitored Services</h2>
      <div class="bg-[#0c1222] rounded-xl p-4 flex items-center justify-between">
        <div class="flex items-center gap-3">
          <div class="relative"><div class="w-3 h-3 bg-green-500 rounded-full"></div><div class="absolute inset-0 w-3 h-3 bg-green-500 rounded-full status-ping"></div></div>
          <div><p class="font-semibold text-sm">OpenAI API</p><p class="text-xs text-gray-500">99.9% uptime</p></div>
        </div>
        <div class="text-right">
          <p class="text-green-400 text-sm font-semibold">Compliant</p>
          <p class="text-xs text-gray-600">0 violations</p>
        </div>
      </div>
    </section>

    <!-- Check -->
    <section class="bg-[#111827] rounded-2xl p-6 border border-gray-800">
      <h2 class="text-amber-400 font-semibold mb-4">Check for Violations</h2>
      <div class="flex gap-3">
        <input placeholder="SLA key" class="flex-1 bg-[#0c1222] border border-gray-700 rounded-xl px-4 py-3 placeholder-gray-600 outline-none">
        <button class="bg-amber-600 hover:bg-amber-500 rounded-xl px-6 font-bold transition">⚡ Check Now</button>
      </div>
    </section>
  </main>
</body>
</html>
